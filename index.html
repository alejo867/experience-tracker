<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Experience Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"/>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #73726c; --text3: #9c9a92;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --purple: #7F77DD; --teal: #1D9E75; --blue: #378ADD;
    --coral: #D85A30; --amber: #BA7517; --pink: #D4537E;
    --gray: #888780; --green: #639922;
    --r-md: 8px; --r-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg2: #242422; --bg3: #2c2c2a;
      --text: #e8e6de; --text2: #9c9a92; --text3: #73726c;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 500; }
  header span { font-size: 13px; color: var(--text2); }
  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .kpi { background: var(--bg); border-radius: var(--r-md); padding: 1rem; border: 0.5px solid var(--border); }
  .kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .kpi-val { font-size: 26px; font-weight: 500; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .facts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .fact { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 0.875rem 1rem; display: flex; gap: 10px; }
  .fact-icon { width: 34px; height: 34px; border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .fact-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .fact-body { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .chart-row { grid-template-columns: 1fr; } }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 1rem; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 0.75rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
  .leg-dot { width: 9px; height: 9px; border-radius: 2px; }
  .tl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .tl-yr { font-size: 11px; color: var(--text2); width: 30px; text-align: right; flex-shrink: 0; }
  .tl-bg { flex: 1; height: 20px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .tl-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 7px; font-size: 11px; font-weight: 500; color: #fff; }
  .tl-n { font-size: 11px; color: var(--text2); width: 22px; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin: 1.5rem 0 .75rem; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .controls input, .controls select { font-size: 13px; background: var(--bg); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--r-md); padding: 0 12px; height: 36px; outline: none; }
  .controls input { flex: 1; min-width: 160px; }
  .controls input:focus, .controls select:focus { border-color: var(--blue); }
  .ev-list { display: flex; flex-direction: column; gap: 5px; }
  .yr-hdr { font-size: 12px; font-weight: 500; color: var(--text2); margin: 1rem 0 .4rem; border-bottom: 0.5px solid var(--border); padding-bottom: 5px; display: flex; justify-content: space-between; }
  .ev { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: .6rem .875rem; display: grid; grid-template-columns: 30px 1fr auto; gap: 0 10px; align-items: start; transition: border-color .15s; cursor: default; }
  .ev:hover { border-color: var(--border2); }
  .ev-badge { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .ev-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .ev-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .ev-note { font-size: 11px; color: var(--amber); margin-top: 1px; }
  .ev-date { font-size: 11px; color: var(--text2); text-align: right; white-space: nowrap; padding-top: 2px; }
  .pill-up { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; padding: 1px 7px; border-radius: 20px; background: #EAF3DE; color: #27500A; margin-top: 3px; }
  @media (prefers-color-scheme: dark) { .pill-up { background: #173404; color: #C0DD97; } }
  .no-res { text-align: center; padding: 2.5rem; color: var(--text2); font-size: 13px; }
  .loading { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
  .add-btn { background: var(--blue); color: #fff; border: none; border-radius: var(--r-md); padding: 0 16px; height: 36px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .add-btn:hover { opacity: .88; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--r-lg); padding: 1.5rem; width: 440px; max-width: 95vw; border: 0.5px solid var(--border2); }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .modal label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select, .modal textarea { width: 100%; font-size: 13px; background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--r-md); padding: 8px 12px; outline: none; }
  .modal textarea { height: 60px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-cancel { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--r-md); padding: 0 14px; height: 34px; font-size: 13px; cursor: pointer; }
  .btn-save { background: var(--blue); color: #fff; border: none; border-radius: var(--r-md); padding: 0 14px; height: 34px; font-size: 13px; cursor: pointer; }
  .error-bar { background: #FCEBEB; color: #791F1F; border-radius: var(--r-md); padding: .75rem 1rem; font-size: 13px; margin-bottom: 1rem; display: none; }
  @media (prefers-color-scheme: dark) { .error-bar { background: #501313; color: #F09595; } }
</style>
</head>
<body>

<header>
  <h1><i class="ti ti-star" style="margin-right:6px;font-size:16px;vertical-align:-2px"></i>Experience Tracker</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="hdr-count">Loading...</span>
    <button class="add-btn" onclick="openModal()"><i class="ti ti-plus" style="font-size:15px"></i> Add event</button>
  </div>
</header>

<div class="container">
  <div class="error-bar" id="err-bar"></div>

  <div class="kpi-grid" id="kpis"><div class="loading">Loading your experiences...</div></div>

  <div class="facts-row" id="facts"></div>

  <div class="section-label">Events per year</div>
  <div class="card" style="margin-bottom:1.5rem" id="timeline"></div>

  <div class="chart-row">
    <div class="card">
      <div class="card-title">By category</div>
      <div class="legend" id="cat-legend"></div>
      <div style="position:relative;width:100%;height:180px"><canvas id="cat-chart" role="img" aria-label="Events by category donut chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">By city</div>
      <div style="position:relative;width:100%;height:260px"><canvas id="city-chart" role="img" aria-label="Events by city bar chart"></canvas></div>
    </div>
  </div>

  <div class="section-label">Browse all events</div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search events, venues, cities..." oninput="renderList()"/>
    <select id="cat-f" onchange="renderList()"><option value="">All categories</option></select>
    <select id="yr-f" onchange="renderList()"><option value="">All years</option></select>
    <select id="srt-f" onchange="renderList()"><option value="newest">Newest first</option><option value="oldest">Oldest first</option></select>
  </div>
  <div class="ev-list" id="ev-list"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>Add experience</h2>
    <label>Event name</label>
    <input type="text" id="f-name" placeholder="e.g. KAROL G – Lumen Field"/>
    <label>Venue</label>
    <input type="text" id="f-venue" placeholder="e.g. Lumen Field"/>
    <label>City</label>
    <input type="text" id="f-city" placeholder="e.g. Seattle, WA"/>
    <label>Date</label>
    <input type="date" id="f-date"/>
    <label>Category</label>
    <select id="f-cat">
      <option value="music">Music / Concert</option>
      <option value="sports">Sports</option>
      <option value="electronic">Electronic / DJ</option>
      <option value="festival">Festival / Arts</option>
      <option value="comedy">Comedy</option>
      <option value="workshop">Workshop / Class</option>
      <option value="other">Other</option>
    </select>
    <label>Note (optional)</label>
    <textarea id="f-note" placeholder="e.g. CONCACAF Champions Cup title win"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save event</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = window.ENV_SUPABASE_URL || '';
const SUPABASE_KEY = window.ENV_SUPABASE_KEY || '';
const TODAY = new Date().toISOString().slice(0,10);

const CAT = {
  music:     {label:'Music / Concert',   icon:'ti-music',        bg:'#EEEDFE',tc:'#3C3489',dbg:'#26215C',dtc:'#CECBF6',col:'#7F77DD'},
  sports:    {label:'Sports',            icon:'ti-ball-football', bg:'#E1F5EE',tc:'#085041',dbg:'#04342C',dtc:'#9FE1CB',col:'#1D9E75'},
  electronic:{label:'Electronic / DJ',   icon:'ti-headphones',   bg:'#E6F1FB',tc:'#0C447C',dbg:'#042C53',dtc:'#B5D4F4',col:'#378ADD'},
  festival:  {label:'Festival / Arts',   icon:'ti-confetti',     bg:'#FAECE7',tc:'#712B13',dbg:'#4A1B0C',dtc:'#F5C4B3',col:'#D85A30'},
  comedy:    {label:'Comedy',            icon:'ti-mood-happy',   bg:'#FAEEDA',tc:'#633806',dbg:'#412402',dtc:'#FAC775',col:'#BA7517'},
  workshop:  {label:'Workshop / Class',  icon:'ti-tools',        bg:'#FBEAF0',tc:'#72243E',dbg:'#4B1528',dtc:'#F4C0D1',col:'#D4537E'},
  other:     {label:'Other',             icon:'ti-sparkles',     bg:'#F1EFE8',tc:'#444441',dbg:'#2C2C2A',dtc:'#D3D1C7',col:'#888780'},
};
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;

function catBg(c){ return isDark ? (CAT[c]?.dbg||'#2C2C2A') : (CAT[c]?.bg||'#F1EFE8'); }
function catTc(c){ return isDark ? (CAT[c]?.dtc||'#D3D1C7') : (CAT[c]?.tc||'#444441'); }
function fmtDate(d){ const [y,m,day]=d.split('-'); return `${MONTHS[parseInt(m)-1]} ${parseInt(day)}, ${y}`; }
function showErr(msg){ const b=document.getElementById('err-bar'); b.textContent=msg; b.style.display='block'; }

async function sbFetch(path, opts={}){
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...opts.headers },
    ...opts
  });
  if(!res.ok){ const t=await res.text(); throw new Error(t); }
  return res.status===204 ? null : res.json();
}

let ALL = [];

async function loadData(){
  try {
    ALL = await sbFetch('experiences?select=*&order=date.desc');
    init();
  } catch(e){
    showErr('Could not load data. Check your Supabase URL and key are set in Vercel environment variables. ('+e.message+')');
    document.getElementById('kpis').innerHTML = '';
  }
}

function init(){
  const years = [...new Set(ALL.map(e=>e.date.slice(0,4)))].sort((a,b)=>b-a);
  const yrF = document.getElementById('yr-f');
  years.forEach(y=>{ const o=document.createElement('option'); o.value=y; o.textContent=y; yrF.appendChild(o); });
  const catF = document.getElementById('cat-f');
  Object.entries(CAT).forEach(([k,v])=>{ const o=document.createElement('option'); o.value=k; o.textContent=v.label; catF.appendChild(o); });
  renderKPIs();
  renderFacts();
  renderTimeline();
  renderCharts();
  renderList();
}

function renderKPIs(){
  const up = ALL.filter(e=>e.date>=TODAY).length;
  const cities = new Set(ALL.map(e=>e.city)).size;
  const venues = new Set(ALL.map(e=>e.venue)).size;
  const yrs = new Set(ALL.map(e=>e.date.slice(0,4))).size;
  const busiest = Object.entries(ALL.reduce((a,e)=>{const y=e.date.slice(0,4);a[y]=(a[y]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-label">Total experiences</div><div class="kpi-val">${ALL.length}</div><div class="kpi-sub">2013 – 2026</div></div>
    <div class="kpi"><div class="kpi-label">Upcoming</div><div class="kpi-val">${up}</div><div class="kpi-sub">events booked</div></div>
    <div class="kpi"><div class="kpi-label">Years active</div><div class="kpi-val">${yrs}</div><div class="kpi-sub">since 2013</div></div>
    <div class="kpi"><div class="kpi-label">Cities visited</div><div class="kpi-val">${cities}</div><div class="kpi-sub">${venues} unique venues</div></div>
    <div class="kpi"><div class="kpi-label">Busiest year</div><div class="kpi-val">${busiest?.[0]||'—'}</div><div class="kpi-sub">${busiest?.[1]||0} events</div></div>
  `;
  document.getElementById('hdr-count').textContent = ALL.length + ' experiences';
}

function renderFacts(){
  const lumen = ALL.filter(e=>e.venue==='Lumen Field').length;
  const drake = ALL.filter(e=>e.name.toLowerCase().includes('drake')).length;
  const karol = ALL.filter(e=>e.name.toLowerCase().includes('karol g')).length;
  const elec  = ALL.filter(e=>e.category==='electronic').length;
  const miami = ALL.filter(e=>e.city&&e.city.includes('Miami')).length;
  const sea   = ALL.filter(e=>e.city&&e.city.includes('Seattle')).length;
  const facts = [
    {cat:'sports', icon:'ti-building-stadium', title:`Lumen Field: ${lumen} events`, body:'Your most-visited venue by a wide margin — from MLS to FIFA CWC'},
    {cat:'music',  icon:'ti-music',            title:`Drake ${drake}x · KAROL G ${karol}x`, body:'A handful of artists have earned multiple return visits across the years'},
    {cat:'sports', icon:'ti-trophy',           title:'CONCACAF Champions', body:'You witnessed the Sounders beat Pumas UNAM for the 2022 title live'},
    {cat:'electronic',icon:'ti-headphones',    title:`${elec} electronic events`, body:'From Art Basel pop-ups to Tomorrowland UNITY at The Sphere in Vegas'},
    {cat:'festival',icon:'ti-map-pin',         title:'Miami roots, Seattle soul', body:`${miami} FL events before the move — now ${sea} Seattle-area experiences`},
    {cat:'other',  icon:'ti-star',             title:'FIFA Club World Cup run', body:'PSG · Atletico Madrid · River Plate · Botafogo — 4 matches in 10 days'},
  ];
  document.getElementById('facts').innerHTML = facts.map(f=>`
    <div class="fact">
      <div class="fact-icon" style="background:${catBg(f.cat)};color:${catTc(f.cat)}"><i class="ti ${f.icon}"></i></div>
      <div><div class="fact-title">${f.title}</div><div class="fact-body">${f.body}</div></div>
    </div>`).join('');
}

function renderTimeline(){
  const COLS = ['#7F77DD','#1D9E75','#378ADD','#D85A30','#BA7517','#D4537E','#888780','#639922','#E24B4A'];
  const byYear = Object.entries(ALL.reduce((a,e)=>{const y=e.date.slice(0,4);a[y]=(a[y]||0)+1;return a},{})).sort((a,b)=>a[0]-b[0]);
  const max = Math.max(...byYear.map(x=>x[1]));
  document.getElementById('timeline').innerHTML = byYear.map(([y,n],i)=>{
    const pct = Math.round((n/max)*100);
    return `<div class="tl-row">
      <div class="tl-yr">${y}</div>
      <div class="tl-bg"><div class="tl-fill" style="width:${pct}%;background:${COLS[i%COLS.length]}">${n>=5?n+' events':''}</div></div>
      <div class="tl-n">${n<5?n:''}</div>
    </div>`;
  }).join('');
}

let catChart, cityChart;
function renderCharts(){
  const catCounts = Object.keys(CAT).map(k=>({k,n:ALL.filter(e=>e.category===k).length})).filter(x=>x.n>0);
  document.getElementById('cat-legend').innerHTML = catCounts.map(x=>`<span class="leg"><span class="leg-dot" style="background:${CAT[x.k].col}"></span>${CAT[x.k].label} ${x.n}</span>`).join('');
  if(catChart) catChart.destroy();
  catChart = new Chart(document.getElementById('cat-chart'),{
    type:'doughnut',
    data:{labels:catCounts.map(x=>CAT[x.k].label),datasets:[{data:catCounts.map(x=>x.n),backgroundColor:catCounts.map(x=>CAT[x.k].col),borderWidth:2,borderColor:isDark?'#1a1a18':'#ffffff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false}}}
  });
  const cityCounts = Object.entries(ALL.reduce((a,e)=>{const c=(e.city||'Unknown').split(',')[0].trim();a[c]=(a[c]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(cityChart) cityChart.destroy();
  cityChart = new Chart(document.getElementById('city-chart'),{
    type:'bar',
    data:{labels:cityCounts.map(x=>x[0]),datasets:[{data:cityCounts.map(x=>x[1]),backgroundColor:'#378ADD',borderRadius:4,borderSkipped:false}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:isDark?'#73726c':'#73726c',font:{size:11}},grid:{color:isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}},y:{ticks:{color:isDark?'#9c9a92':'#73726c',font:{size:11}},grid:{display:false}}}}
  });
}

function renderList(){
  const q = document.getElementById('search').value.toLowerCase();
  const ct = document.getElementById('cat-f').value;
  const yr = document.getElementById('yr-f').value;
  const srt = document.getElementById('srt-f').value;
  let data = ALL.filter(e=>{
    if(yr && e.date.slice(0,4)!==yr) return false;
    if(ct && e.category!==ct) return false;
    if(q && !((e.name||'').toLowerCase().includes(q)||(e.venue||'').toLowerCase().includes(q)||(e.city||'').toLowerCase().includes(q))) return false;
    return true;
  });
  data = [...data].sort((a,b)=>srt==='oldest'?a.date.localeCompare(b.date):b.date.localeCompare(a.date));
  if(!data.length){ document.getElementById('ev-list').innerHTML='<div class="no-res"><i class="ti ti-mood-sad" style="font-size:22px;display:block;margin-bottom:6px"></i>No events match your filters</div>'; return; }
  const grouped={};
  data.forEach(e=>{const y=e.date.slice(0,4);if(!grouped[y])grouped[y]=[];grouped[y].push(e);});
  const ordYrs = Object.keys(grouped).sort((a,b)=>srt==='oldest'?a-b:b-a);
  let html='';
  ordYrs.forEach(y=>{
    const evs=grouped[y];
    html+=`<div class="yr-hdr"><span>${y}</span><span>${evs.length} event${evs.length!==1?'s':''}</span></div>`;
    evs.forEach(e=>{
      const bg=catBg(e.category), tc=catTc(e.category);
      const up = e.date>=TODAY;
      html+=`<div class="ev">
        <div class="ev-badge" style="background:${bg};color:${tc}"><i class="ti ${CAT[e.category]?.icon||'ti-star'}" style="font-size:13px"></i></div>
        <div>
          <div class="ev-name">${e.name||''}</div>
          <div class="ev-meta">${e.venue||''} · ${e.city||''}</div>
          ${e.note?`<div class="ev-note">${e.note}</div>`:''}
          ${up?'<span class="pill-up"><i class="ti ti-clock" style="font-size:10px"></i> Upcoming</span>':''}
        </div>
        <div class="ev-date">${fmtDate(e.date)}</div>
      </div>`;
    });
  });
  document.getElementById('ev-list').innerHTML = html;
}

function openModal(){ document.getElementById('modal-bg').classList.add('open'); }
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }

async function saveEvent(){
  const name  = document.getElementById('f-name').value.trim();
  const venue = document.getElementById('f-venue').value.trim();
  const city  = document.getElementById('f-city').value.trim();
  const date  = document.getElementById('f-date').value;
  const cat   = document.getElementById('f-cat').value;
  const note  = document.getElementById('f-note').value.trim();
  if(!name||!date){ alert('Name and date are required.'); return; }
  try {
    const [row] = await sbFetch('experiences', { method:'POST', body: JSON.stringify({name,venue,city,date,category:cat,note:note||null}) });
    ALL.unshift(row);
    closeModal();
    renderKPIs(); renderFacts(); renderTimeline(); renderCharts(); renderList();
    ['f-name','f-venue','f-city','f-date','f-note'].forEach(id=>document.getElementById(id).value='');
  } catch(e){ alert('Could not save: '+e.message); }
}

document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
loadData();
</script>
